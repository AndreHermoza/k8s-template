server:
  port: ${SERVER_PORT:9000}

spring:
  application:
    name: hackaton-template

  r2dbc:
    # --- Local (H2) - configuración activa por defecto ---
    url: ${R2DBC_URL:r2dbc:h2:mem:///testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USER:${R2DBC_USERNAME:${SECRET_USERNAME:sa}}}
    password: ${DB_PASSWORD:${R2DBC_PASSWORD:${SECRET_PASSWORD:password}}}

    # --- Docker Compose (PostgreSQL) - descomentar y comentar el bloque H2 de arriba ---
    # url: r2dbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:hackaton}
    # username: ${DB_USER:hackaton}
    # password: ${DB_PASSWORD:hackaton}

    # --- Docker Compose (MySQL) - opcional, descomentar si usas el servicio mysql del compose ---
    # Requiere dependencia: io.asyncer:r2dbc-mysql
    # url: r2dbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:hackaton}
    # username: ${DB_USER:hackaton}
    # password: ${DB_PASSWORD:hackaton}

  sql:
    init:
      schema-locations: classpath:schema.sql
      mode: ${SPRING_SQL_INIT_MODE:always}


