# --- Docker Compose (Nginx) - opcional ---
# Si usas el servicio nginx del compose, la API queda detrás del proxy en el puerto 80.
# Ejemplo de acceso: http://localhost/api/productos
# No requiere cambios en spring; nginx redirige hacia api:9000.
