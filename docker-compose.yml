services:
  postgres:
    image: postgres:16-alpine
    container_name: hackaton-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hackaton}
      POSTGRES_USER: ${DB_USER:-hackaton}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hackaton}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hackaton} -d ${DB_NAME:-hackaton}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - hackaton-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hackaton-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-9000}:9000"
    environment:
      R2DBC_URL: r2dbc:postgresql://postgres:5432/${DB_NAME:-hackaton}
      R2DBC_USERNAME: ${DB_USER:-hackaton}
      R2DBC_PASSWORD: ${DB_PASSWORD:-hackaton}
      SPRING_SQL_INIT_MODE: never
      SPRING_AUTOCONFIGURE_EXCLUDE: >-
        org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,
        org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
    depends_on:
      postgres:
        condition: service_healthy
      # mysql:
      #   condition: service_healthy
    networks:
      - hackaton-network

  # --- MySQL (opcional) ---
  # Descomentar este servicio y comentar postgres si deseas usar MySQL.
  # Requiere agregar la dependencia io.asyncer:r2dbc-mysql en pom.xml
  # y adaptar schema.sql a sintaxis MySQL.
  #
  # mysql:
  #   image: mysql:8.4
  #   container_name: hackaton-mysql
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
  #     MYSQL_DATABASE: ${MYSQL_DATABASE:-hackaton}
  #     MYSQL_USER: ${MYSQL_USER:-hackaton}
  #     MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hackaton}
  #   ports:
  #     - "${MYSQL_PORT:-3306}:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #     - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-hackaton}", "-p${MYSQL_PASSWORD:-hackaton}"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 20s
  #   networks:
  #     - hackaton-network
  #
  # En el servicio api, comentar las variables de postgres y usar:
  #   R2DBC_URL: r2dbc:mysql://mysql:3306/${MYSQL_DATABASE:-hackaton}
  #   R2DBC_USERNAME: ${MYSQL_USER:-hackaton}
  #   R2DBC_PASSWORD: ${MYSQL_PASSWORD:-hackaton}

  # --- Nginx (opcional) ---
  # Descomentar para exponer la API por el puerto 80 como reverse proxy.
  # Acceso: http://localhost/api/estudiantes
  #
  # nginx:
  #   image: nginx:alpine
  #   container_name: hackaton-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "${NGINX_PORT:-80}:80"
  #   volumes:
  #     - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - api
  #   networks:
  #     - hackaton-network

volumes:
  postgres_data:
    name: hackaton-postgres-data
  # mysql_data:
  #   name: hackaton-mysql-data

networks:
  hackaton-network:
    name: hackaton-network
    driver: bridge
